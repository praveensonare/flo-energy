version: "3.9"

# ============================================================
# Flo Energy – Meter Reading ETL Agent  – Local Dev Stack
# ============================================================
# Services:
#   postgres  – local PostgreSQL 15 instance
#   agent     – the ETL agent (runs against sample data)
#
# Usage:
#   docker compose up postgres          # start DB only
#   docker compose run agent /data/sample_nem12.csv
#   docker compose run agent /data/sample_nem12.csv --no-agent

services:

  # ----------------------------------------------------------
  # PostgreSQL 15
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: meter_postgres
    environment:
      POSTGRES_DB: meter_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meter_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ----------------------------------------------------------
  # ETL Agent
  # ----------------------------------------------------------
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: meter_agent
    depends_on:
      postgres:
        condition: service_healthy
    # All settings come from .env — pydantic-settings reads it at startup.
    # DATABASE_URL is the only override: inside the container the Postgres
    # host is the service name "postgres", not "localhost".
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/meter_db
    volumes:
      - ./data:/data:ro          # input files (read-only)
      - ./output:/output         # SQL output (writable)
    ports:
      - "8000:8000"              # Prometheus metrics
    # Default: run against sample data without the agent (no API key needed)
    command: ["/data/sample_nem12.csv", "--no-agent"]
    restart: "no"

volumes:
  postgres_data:
